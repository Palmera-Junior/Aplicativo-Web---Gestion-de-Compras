<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Palmera Junior</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-slate-100">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-extrabold text-slate-800">Palmera Junior</h2>
            <p class="text-sm text-slate-500 mt-1">Gestión Interna de Compras</p>
        </div>

        <div th:if="${param.error}" class="mb-4 p-4 text-sm text-red-700 bg-red-50 border-l-4 border-red-500 rounded-r-md" role="alert">
            <span class="font-semibold">Error:</span> El usuario o la contraseña no coinciden.
        </div>

        <div th:if="${param.logout}" class="mb-4 p-4 text-sm text-emerald-700 bg-emerald-50 border-l-4 border-emerald-500 rounded-r-md" role="alert">
            Sesión cerrada correctamente. ¡Vuelve pronto!
        </div>

        <form th:action="@{/login}" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-1">Nombre de Usuario</label>
                <input type="text" id="username" name="username" placeholder="Escribe tu username" required
                       class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm text-slate-700">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required
                       class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm text-slate-700">
            </div>

            <button type="submit" 
                    class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg text-sm transition duration-150 ease-in-out shadow-sm shadow-blue-200 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Ingresar al Sistema
            </button>
        </form>
    </div>

</body>
</html>
